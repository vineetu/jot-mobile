name: Jot
options:
  bundleIdPrefix: com.jot.mobile
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    # User's free personal team (tejastej.dc@gmail.com). Pinned so xcodegen
    # regeneration doesn't wipe the signing team out of Xcode every time.
    DEVELOPMENT_TEAM: "6966SNKBNF"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: "0.13.6"

targets:
  Jot:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
      # Main-app-only asset catalog (AppIcon + future brand tokens).
      # Extensions (JotKeyboard, JotWidget) don't render custom icons on iOS,
      # so they don't need their own xcassets — the app icon is the only
      # catalogued asset today.
      # `ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon` in the generated
      # pbxproj already expects a bundled AppIcon.appiconset; without this
      # source entry the catalog never made it into a build phase, so even
      # a valid `icon-1024.png` got dropped on the floor.
      - path: Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Jot
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: YES
        NSMicrophoneUsageDescription: "Jot records your voice on-device so you can dictate text. Audio never leaves your iPhone."
        # Required for ActivityKit. Without this key, Activity.request(...)
        # fails with "Target does not include NSSupportsLiveActivities plist
        # key" and AudioRecordingIntent cannot activate the audio session.
        # Verified in Console.app syslog 2026-04-21 20:06:59 — liveactivitiesd
        # rejected the request for widget(containingProcess: com.jot.mobile.Jot).
        # See: https://developer.apple.com/documentation/activitykit/starting-and-updating-live-activities
        NSSupportsLiveActivities: YES
        UIBackgroundModes:
          - audio
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.jot.mobile.Jot.warm-parakeet
        LSApplicationQueriesSchemes:
          - messages
        CFBundleURLTypes:
          - CFBundleURLName: com.jot.mobile
            CFBundleURLSchemes:
              - jot
    entitlements:
      path: Resources/Jot.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jot.mobile.shared
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - sdk: AppIntents.framework
      - sdk: BackgroundTasks.framework
      - target: JotKeyboard
      - target: JotWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jot.mobile.Jot
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
      # `JOT_APP_HOST` gates main-app-only bodies inside files that live in
      # `Shared/` and are therefore also compiled into widget + keyboard
      # extensions. Used by `StopDictationIntent` so its `perform()` body can
      # reference `DictationIntentBridge` (main-app-only) without breaking
      # extension compilation — the `LiveActivityIntent` protocol promotes
      # execution into the main-app process at runtime, so only the main-app
      # body ever needs to actually do the stop work.
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG JOT_APP_HOST
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: JOT_APP_HOST

  JotKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Keyboard
      - path: Shared
    info:
      path: Resources/Keyboard-Info.plist
      properties:
        CFBundleDisplayName: Jot Dictation
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).JotKeyboardViewController
    entitlements:
      path: Resources/Keyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jot.mobile.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jot.mobile.Jot.Keyboard
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  JotWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Shared
    info:
      path: Resources/Widget-Info.plist
      properties:
        CFBundleDisplayName: Jot Live Activity
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Resources/Widget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jot.mobile.shared
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: ActivityKit.framework
      # Required so the Live Activity can declare
      # `Button(intent: StopDictationIntent())`. The intent type itself lives
      # in `Shared/` so both the widget (for `Button(intent:)` construction)
      # and the main app (for `perform()` execution under LiveActivityIntent
      # promotion) can see it; both targets therefore need `AppIntents` on
      # the link line.
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jot.mobile.Jot.Widget
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

schemes:
  Jot:
    build:
      targets:
        Jot: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  JotKeyboard:
    build:
      targets:
        JotKeyboard: all
    run:
      config: Debug
    archive:
      config: Release
  JotWidget:
    build:
      targets:
        JotWidget: all
    run:
      config: Debug
    archive:
      config: Release
