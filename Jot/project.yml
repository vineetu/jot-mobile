name: Jot
options:
  bundleIdPrefix: com.vineetu.jot.mobile
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CURRENT_PROJECT_VERSION: "21"
    MARKETING_VERSION: "1.0.2"
    # Vineet's team — same one used for Mac Jot. Pinned so xcodegen
    # regeneration doesn't wipe the signing team out of Xcode every time.
    DEVELOPMENT_TEAM: "8VB2ULDN22"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: "0.14.7"
  # MLX backend stack for the on-device Qwen 3.5 rewrite path. Declared
  # at the project level so xcodegen emits the package refs, but only the
  # `Jot` target depends on the products — JotKeyboard MUST NOT pull in
  # MLX (60MB extension ceiling; the keyboard URL-bounces to the main app
  # for rewrite calls).
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    exactVersion: "3.31.3"
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    minVersion: "0.9.0"
    maxVersion: "1.0.0"
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    minVersion: "1.3.0"
    maxVersion: "2.0.0"
  # Vendored fork of mlx-swift-structured with 3.x dep pin bumps and the
  # `tokenizerSource` 2→3 API patch. Path is relative to `Jot/project.yml`,
  # so `..` is the repo root and `../Vendor/mlx-swift-structured` is the
  # top-level Vendor dir promoted from the prototype.
  MLXSwiftStructured:
    path: ../Vendor/mlx-swift-structured

targets:
  Jot:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
      # Main-app asset catalog (AppIcon + future brand tokens).
      # The keyboard extension has its OWN separate catalog at
      # `Keyboard/Assets.xcassets` so Settings → General → Keyboard →
      # Keyboards can render an icon for the appex — see that target's
      # sources block below.
      # `ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon` in the generated
      # pbxproj already expects a bundled AppIcon.appiconset; without this
      # source entry the catalog never made it into a build phase, so even
      # a valid `icon-1024.png` got dropped on the floor.
      - path: Resources/Assets.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
      # Fraunces editorial typeface (SIL OFL). Phase 1 of the UX overhaul
      # bundles the 72pt opsz-keyed statics; UIAppFonts in
      # Resources/Info.plist registers them at runtime.
      - path: Resources/Fonts
        buildPhase: resources
      # Bundled Parakeet speech models (~530 MB):
      #   - parakeet-tdt-ctc-110m/        TDT-CTC 110M (default batch transcriber)
      #   - parakeet-ctc-110m-coreml/     CTC aux (vocabulary biasing + CtcHead.mlmodelc)
      #   - parakeet-eou-streaming/320ms/ EOU 120M (streaming live caption)
      # Shipped as a FOLDER REFERENCE (type: folder) so each `.mlmodelc`
      # ships as-is — they're already-compiled CoreML packages that must
      # NOT be re-processed by the asset compiler. Without `type: folder`,
      # Xcode would flatten the `.mlmodelc` directory or attempt to
      # recompile the CoreML packages, breaking the bundle.
      # FluidAudio's load APIs (`AsrModels.load(from:)`,
      # `StreamingEouAsrManager.loadModels(from:)`,
      # `CtcModels.loadDirect(from:)`) accept directory URLs and find
      # these subtrees by relative path, so no first-launch download is
      # needed for the default dictation flow (App Review 4.2.3(ii)).
      - path: Resources/Models
        type: folder
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Jot
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Jot records your voice on-device so you can dictate text. Audio never leaves your iPhone."
        UIBackgroundModes:
          - audio
          # `processing` enables BGProcessingTask scheduling — used by the
          # transcript classifier (Lab feature, charging-only). The
          # identifier `…classify-transcripts` is registered in
          # `JotApp.init` and gated by the `jot.classifier.enabled`
          # UserDefaults toggle.
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.vineetu.jot.mobile.Jot.classify-transcripts
        CFBundleURLTypes:
          - CFBundleURLName: com.vineetu.jot.mobile
            CFBundleURLSchemes:
              - jot
        # Phase 1 of the UX overhaul: register Fraunces TTFs so
        # Font.custom("Fraunces72pt-Regular", ...) resolves at runtime.
        # Files live under Jot/Resources/Fonts/ and ship as bundle
        # resources via the main-app target's sources list.
        #
        # Phase 1 punch-list FIX 1: the 9pt-opsz Italic static is the
        # text-tuned cut used at 19pt body italic (`editorialItalic`).
        # The 72pt-opsz Italic stays for display-sized italics (≥24pt).
        UIAppFonts:
          - Fraunces-Regular.ttf
          - Fraunces-Medium.ttf
          - Fraunces-Italic.ttf
          - Fraunces-MediumItalic.ttf
          - Fraunces9pt-Italic.ttf
    entitlements:
      path: Resources/Jot.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.vineetu.jot.mobile.shared
        # Bumps the per-app memory ceiling on devices with 6 GB+ RAM
        # (iPhone 14 Pro and newer). Required because Qwen 3.5 4B
        # weights are ~2.5 GB resident and Parakeet 600M is ~2 GB —
        # default budget on a 6 GB device is ~3 GB and we run both
        # routinely. No-op on older devices; no Apple review needed.
        com.apple.developer.kernel.increased-memory-limit: true
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - sdk: AppIntents.framework
      # MLX stack for Qwen 3.5. Main-app-only — extensions stay MLX-free.
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftHuggingFace
        product: HuggingFace
      - package: SwiftTransformers
        product: Tokenizers
      - package: MLXSwiftStructured
        product: MLXStructured
      # Apple Foundation Models is linked into the main-app target
      # because `CleanupService` uses `SystemLanguageModel` for non-rewrite
      # transcript cleanup. It is NOT a rewrite provider — Qwen 3.5 on
      # MLX is the sole rewrite backend.
      - sdk: FoundationModels.framework
      - target: JotKeyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vineetu.jot.mobile.Jot
        GENERATE_INFOPLIST_FILE: NO
        # iPhone-only (1). iPad (2) was previously paired with the now-deprecated
        # UIRequiresFullScreen=YES to suppress iPad's all-orientations
        # requirement. With UIRequiresFullScreen gone (iOS 26 deprecation),
        # iPad would force us to support landscape, which doesn't fit a
        # one-handed dictation UX. MVP target is iPhone 15 Pro+, so iPhone-only.
        TARGETED_DEVICE_FAMILY: "1"
      # `JOT_APP_HOST` gates main-app-only bodies inside files that live in
      # `Shared/` and are therefore also compiled into the keyboard extension.
      # Used by `RewriteWithPromptIntent` so its `perform()` body can reference
      # main-app-only code (`LLMClientFactory`, `SavedPromptStore`) without
      # breaking extension compilation. The keyboard fires the intent via a
      # `jot://rewrite?session=<uuid>` URL bounce; only the main-app body ever
      # runs.
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG JOT_APP_HOST
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: JOT_APP_HOST

  JotKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Keyboard
      # Keyboard-extension AppIcon catalog. iOS shows this image in
      # Settings → General → Keyboard → Keyboards alongside the
      # extension's CFBundleDisplayName ("Jot Dictation"). Mirrors the
      # main app's modern single-size universal-iOS format — Xcode
      # synthesizes the per-resolution variants from the 1024×1024
      # source at build time. Paired with
      # `ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon` below so the
      # asset compiler picks the right set.
      - path: Keyboard/Assets.xcassets
      - path: Shared
      # Phase 2 of the UX overhaul (mockups 01-03, 06): the keyboard
      # surface uses the Phase-1 design-system tokens — JotDesign,
      # JotType, color extensions on `Color`, GlassCard, SectionLabel,
      # etc. These files have zero main-app dependencies (pure SwiftUI
      # + Color tokens) so compiling them into the appex is free.
      # Files themselves are Phase-1 locked; only the project membership
      # is added here.
      #
      # Phase 2 reviewer FIX 3: explicit per-file inclusion instead of
      # the full `App/Design` directory. DictateFAB and ActionBar are
      # main-app-only — they don't belong in the 60MB extension
      # envelope. The keyboard pulls in only:
      #   - JotDesign.swift (tokens + Color/Font extensions)
      #   - Components/GlassCard.swift, IconBox.swift, SectionLabel.swift
      #   - Components/RowChevron.swift, StatusPill.swift
      - path: App/Design/JotDesign.swift
      - path: App/Design/Components/GlassCard.swift
      - path: App/Design/Components/IconBox.swift
      - path: App/Design/Components/SectionLabel.swift
      - path: App/Design/Components/RowChevron.swift
      - path: App/Design/Components/StatusPill.swift
      - path: Resources/PrivacyInfo.xcprivacy
      # Fraunces must also be inside the keyboard extension bundle so the
      # streaming-strip / just-now-marker text rendered from the appex
      # process resolves the Font.custom(...) PostScript names. Otherwise
      # SwiftUI silently falls back to system serif inside the keyboard.
      - path: Resources/Fonts
        buildPhase: resources
    info:
      path: Resources/Keyboard-Info.plist
      properties:
        CFBundleDisplayName: Jot Dictation
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).JotKeyboardViewController
        # Required for `extensionContext.open(URL("jot://..."))` to actually
        # launch the containing Jot app from the keyboard. iOS 9+ blocks
        # extension URL opens for schemes not declared here.
        LSApplicationQueriesSchemes:
          - jot
        # Phase 1 of the UX overhaul: register Fraunces TTFs inside the
        # keyboard extension bundle too. The keyboard renders the streaming
        # caption + just-now marker with Fraunces; without this UIAppFonts
        # array the appex would silently fall back to system serif.
        #
        # Phase 1 punch-list FIX 1: 9pt-opsz Italic static for 19pt body
        # italic (`editorialItalic`) shipped to the appex as well.
        UIAppFonts:
          - Fraunces-Regular.ttf
          - Fraunces-Medium.ttf
          - Fraunces-Italic.ttf
          - Fraunces-MediumItalic.ttf
          - Fraunces9pt-Italic.ttf
    entitlements:
      path: Resources/Keyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.vineetu.jot.mobile.shared
    # No `dependencies:` block. The keyboard no longer runs Apple
    # Intelligence rewrite in-process — keyboard rewrite URL-bounces
    # into the main app, where Qwen 3.5 on MLX handles the call. The
    # keyboard target therefore needs zero framework or package
    # dependencies beyond what UIKit / SwiftUI / AppIntents pull in
    # transitively for the `Shared/` sources, and those are linked
    # automatically by xcodebuild without an explicit entry. The MLX
    # stack is NOT linked into the keyboard — it lives in the main-app
    # target only (the keyboard's 60 MB ceiling can't host the ~2.5 GB
    # LLM weights anyway). Apple FM remains linked into the main-app
    # target only (for `CleanupService`).
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vineetu.jot.mobile.Jot.Keyboard
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        # Resolves the AppIcon set inside Keyboard/Assets.xcassets so
        # Settings → General → Keyboard → Keyboards shows the lavender
        # paper-crane icon next to "Jot Dictation".
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  JotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Jot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vineetu.jot.mobile.Jot.Tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: ""

schemes:
  Jot:
    build:
      targets:
        Jot: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - JotTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  JotKeyboard:
    build:
      targets:
        JotKeyboard: all
    run:
      config: Debug
    archive:
      config: Release
