name: Jot
options:
  bundleIdPrefix: com.vineetu.jot.mobile
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    # Xcode 15+ wraps all user scripts in a sandbox that only grants
    # access to declared inputFiles / outputFiles and their direct
    # ancestors. Our "Embed Watch Content" postBuildScript needs to
    # `ditto` an entire .app bundle (recursive write to many nested
    # paths inside Jot.app/Watch/JotWatch.app/) which the sandbox
    # denies as "Operation not permitted". This is a well-known issue
    # affecting many CocoaPods/Carthage/custom scripts; standard fix
    # is to disable script sandboxing at the project level. The risk
    # is minimal — scripts can already do anything they want during a
    # build; the sandbox is defense-in-depth, not a security boundary.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CURRENT_PROJECT_VERSION: "215"
    MARKETING_VERSION: "1.0.7"
    # Vineet's team — same one used for Mac Jot. Pinned so xcodegen
    # regeneration doesn't wipe the signing team out of Xcode every time.
    DEVELOPMENT_TEAM: "8VB2ULDN22"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: "0.14.7"
  # MLX backend stack for the on-device Qwen 3.5 rewrite path. Declared
  # at the project level so xcodegen emits the package refs, but only the
  # `Jot` target depends on the products — JotKeyboard MUST NOT pull in
  # MLX (60MB extension ceiling; the keyboard URL-bounces to the main app
  # for rewrite calls).
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    exactVersion: "3.31.3"
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    minVersion: "0.9.0"
    maxVersion: "1.0.0"
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    minVersion: "1.3.0"
    maxVersion: "2.0.0"
  # Vendored fork of mlx-swift-structured with 3.x dep pin bumps and the
  # `tokenizerSource` 2→3 API patch. Path is relative to `Jot/project.yml`,
  # so `..` is the repo root and `../Vendor/mlx-swift-structured` is the
  # top-level Vendor dir promoted from the prototype.
  MLXSwiftStructured:
    path: ../Vendor/mlx-swift-structured
  # EmbeddingGemma-300M sentence embedder via CoreML/ANE — the Ask RAG
  # retrieval substrate (chunk + query embeddings). Model is bundled
  # out-of-band in Resources/Models (not downloaded at runtime). Main-app
  # only — keyboard never embeds (60MB extension ceiling). Replaces the
  # MiniLM/swift-embeddings path. See docs/plans/ask-retrieval-architecture.md.
  CoreMLLLM:
    url: https://github.com/john-rocky/CoreML-LLM
    exactVersion: "1.9.0"

targets:
  Jot:
    type: application
    platform: iOS
    # Embed the paired watch app inside the iPhone IPA at the
    # canonical `Payload/Jot.app/Watch/JotWatch.app/` location. Apple's
    # distribution model: the watch app rides as a nested bundle
    # inside the iPhone IPA, and on install the system pushes the
    # watch app onto the paired Apple Watch automatically.
    #
    # Why a postBuildScript instead of xcodegen's `embed: true`:
    # xcodegen issue #1463 (open and confirmed in source) — xcodegen's
    # auto-embed logic for watchOS-app-inside-iOS-app was written for
    # the legacy `application.watchapp2` target type. For the modern
    # WKApplication standalone single-target watch app (what we use for
    # watchOS 26), the auto-embed silently does nothing. The explicit
    # `copy:` workaround per ProjectSpec.md is also silently ignored
    # for target dependencies — verified empirically by inspecting the
    # generated pbxproj (no PBXCopyFilesBuildPhase with dstPath=Watch
    # appears regardless of `copy:` directive).
    #
    # The post-build script bypasses xcodegen entirely and writes the
    # nested bundle directly. Uses `ditto` (Apple's recommended bundle
    # copy tool — preserves symlinks, metadata, code signatures intact).
    # The `dependencies` declaration with `embed: false` exists only to
    # establish the build-graph ordering (JotWatch builds first).
    dependencies:
      - target: JotWatch
        embed: false
        link: false
    postBuildScripts:
      - name: Embed Watch Content
        # `inputFiles` makes Xcode re-run this script when the watch
        # bundle changes, and emits the path for incremental rebuilds.
        inputFiles:
          - $(BUILD_DIR)/$(CONFIGURATION)-watchos/JotWatch.app
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/Watch/JotWatch.app
        script: |
          set -eu
          # Simulator builds produce no watchOS product, so the embed below would
          # fail. Skip it for iphonesimulator (used for verification); device /
          # archive builds (iphoneos) still run it strictly.
          if [ "${PLATFORM_NAME:-}" = "iphonesimulator" ]; then
            echo "[Embed Watch Content] simulator build — skipping watch embed"
            exit 0
          fi
          echo "[Embed Watch Content] starting"
          echo "[Embed Watch Content] BUILD_DIR=$BUILD_DIR"
          echo "[Embed Watch Content] CONFIGURATION=$CONFIGURATION"
          echo "[Embed Watch Content] TARGET_BUILD_DIR=$TARGET_BUILD_DIR"
          echo "[Embed Watch Content] WRAPPER_NAME=$WRAPPER_NAME"
          WATCH_APP_SRC="$BUILD_DIR/$CONFIGURATION-watchos/JotWatch.app"
          WATCH_APP_DST="$TARGET_BUILD_DIR/$WRAPPER_NAME/Watch"
          echo "[Embed Watch Content] src=$WATCH_APP_SRC"
          echo "[Embed Watch Content] dst=$WATCH_APP_DST"
          if [ ! -e "$WATCH_APP_SRC" ]; then
            echo "error: watch app not found at $WATCH_APP_SRC — JotWatch must build first"
            exit 1
          fi
          mkdir -p "$WATCH_APP_DST"
          rm -rf "$WATCH_APP_DST/JotWatch.app"
          # `ditto` deep-copies a bundle preserving xattrs + code sig.
          # Top-level symlinks are resolved (so we copy the real bundle
          # contents, not a dangling link into a build dir that may not
          # survive archive packaging).
          ditto "$WATCH_APP_SRC" "$WATCH_APP_DST/JotWatch.app"
          echo "[Embed Watch Content] copy complete — listing destination:"
          ls -la "$WATCH_APP_DST/JotWatch.app/" | head -10
          echo "[Embed Watch Content] done"
    sources:
      - path: App
      - path: Shared
      # Main-app asset catalog (AppIcon + future brand tokens).
      # The keyboard extension has its OWN separate catalog at
      # `Keyboard/Assets.xcassets` so Settings → General → Keyboard →
      # Keyboards can render an icon for the appex — see that target's
      # sources block below.
      # `ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon` in the generated
      # pbxproj already expects a bundled AppIcon.appiconset; without this
      # source entry the catalog never made it into a build phase, so even
      # a valid `icon-1024.png` got dropped on the floor.
      - path: Resources/Assets.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
      # iOS Settings.bundle — adds help + an accurate privacy explainer to the
      # system Settings → Jot page, below the permission toggles (the Willow
      # pattern). Shipped as a FOLDER REFERENCE so the bundle's Root.plist is
      # copied as-is and NOT re-compiled into the app's flattened plist. See
      # Resources/Settings.bundle/Root.plist + Settings → PRIVACY in
      # App/Settings/SettingsView.swift (mirrored copy).
      - path: Resources/Settings.bundle
        type: folder
        buildPhase: resources
      # Common-word frequency list (top ~24k English words) for the vocabulary
      # gate's common-word guard — stops a custom term overwriting an everyday
      # word. See App/Vocabulary/{CommonWords,VocabularyGate}.swift.
      - path: Resources/common-words.txt
        buildPhase: resources
      # Bundled product-help corpus (distilled from features.md, pre-embedded
      # with EmbeddingGemma) powering Ask's "how do I use Jot" lane. Regenerate
      # via scripts/make-help-corpus.sh when features.md changes;
      # scripts/check-help-corpus-fresh.sh guards staleness at build time.
      # See App/Ask/HelpCorpus.swift + docs/ask-product-help/design.md.
      - path: Resources/help-corpus.json
        buildPhase: resources
      # TTS Lab — Supertonic-3 voice-style presets (F1-F5, M1-M5; ~2.9 MB
      # total). 10 bundled voices; only the ~398 MB Supertonic model downloads
      # at runtime on opt-in. Loaded via `Supertonic3VoiceStyle.load(from:)`.
      - path: Resources/SupertonicVoices
        buildPhase: resources
      # Fraunces editorial typeface (SIL OFL). Phase 1 of the UX overhaul
      # bundles the 72pt opsz-keyed statics; UIAppFonts in
      # Resources/Info.plist registers them at runtime.
      - path: Resources/Fonts
        buildPhase: resources
      # Bundled Parakeet speech models (~530 MB):
      #   - parakeet-tdt-ctc-110m/        TDT-CTC 110M (default batch transcriber)
      #   - parakeet-ctc-110m-coreml/     CTC aux (vocabulary biasing + CtcHead.mlmodelc)
      #   - parakeet-eou-streaming/320ms/ EOU 120M (streaming live caption)
      # Shipped as a FOLDER REFERENCE (type: folder) so each `.mlmodelc`
      # ships as-is — they're already-compiled CoreML packages that must
      # NOT be re-processed by the asset compiler. Without `type: folder`,
      # Xcode would flatten the `.mlmodelc` directory or attempt to
      # recompile the CoreML packages, breaking the bundle.
      # FluidAudio's load APIs (`AsrModels.load(from:)`,
      # `StreamingEouAsrManager.loadModels(from:)`,
      # `CtcModels.loadDirect(from:)`) accept directory URLs and find
      # these subtrees by relative path, so no first-launch download is
      # needed for the default dictation flow (App Review 4.2.3(ii)).
      - path: Resources/Models
        type: folder
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Jot
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Jot records your voice on-device so you can dictate text. Audio never leaves your iPhone."
        UIBackgroundModes:
          - audio
          # `processing` enables BGProcessingTask scheduling. Kept after
          # the classifier rip-out because future heavy BG work may want
          # the longer (~10-min) budget. The current EmbeddingGemma backfill
          # task is a BGAppRefreshTask (lighter, no charging requirement) —
          # see `EmbeddingBackfillTask`.
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          # BGAppRefreshTask handler registered in `JotApp.init`. Drains
          # any transcripts whose inline embedding write missed (app
          # backgrounded before the detached encode completed). 30s budget
          # per fire; gated by the `jot.embeddings.enabled` Lab toggle
          # (default ON). The prior `classify-transcripts` identifier was
          # removed when the Qwen classifier was ripped out; any pending
          # iOS-scheduled requests under the old ID are cleared at
          # `JotApp.init` via `BGTaskScheduler.shared.cancelAllTaskRequests()`.
          - com.vineetu.jot.mobile.Jot.backfill-embeddings
        CFBundleURLTypes:
          - CFBundleURLName: com.vineetu.jot.mobile
            CFBundleURLSchemes:
              - jot
        # Phase 1 of the UX overhaul: register Fraunces TTFs so
        # Font.custom("Fraunces72pt-Regular", ...) resolves at runtime.
        # Files live under Jot/Resources/Fonts/ and ship as bundle
        # resources via the main-app target's sources list.
        #
        # Phase 1 punch-list FIX 1: the 9pt-opsz Italic static is the
        # text-tuned cut used at 19pt body italic (`editorialItalic`).
        # The 72pt-opsz Italic stays for display-sized italics (≥24pt).
        UIAppFonts:
          - Fraunces-Regular.ttf
          - Fraunces-Medium.ttf
          - Fraunces-Italic.ttf
          - Fraunces-MediumItalic.ttf
          - Fraunces9pt-Italic.ttf
    entitlements:
      path: Resources/Jot.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.vineetu.jot.mobile.shared
        # Bumps the per-app memory ceiling on devices with 6 GB+ RAM
        # (iPhone 14 Pro and newer). Required because Qwen 3.5 4B
        # weights are ~2.5 GB resident and Parakeet 600M is ~2 GB —
        # default budget on a 6 GB device is ~3 GB and we run both
        # routinely. No-op on older devices; no Apple review needed.
        com.apple.developer.kernel.increased-memory-limit: true
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - sdk: AppIntents.framework
      # MLX stack for Qwen 3.5. Main-app-only — extensions stay MLX-free.
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftHuggingFace
        product: HuggingFace
      - package: SwiftTransformers
        product: Tokenizers
      - package: MLXSwiftStructured
        product: MLXStructured
      # Apple Foundation Models is linked into the main-app target
      # because `CleanupService` uses `SystemLanguageModel` for non-rewrite
      # transcript cleanup. It is NOT a rewrite provider — Qwen 3.5 on
      # MLX is the sole rewrite backend.
      - sdk: FoundationModels.framework
      # Apple Translation framework (iOS 18+) — on-device offline translation for
      # the TTS Lab (translate a transcript before Kokoro reads it in a non-English
      # voice). SwiftUI-tied API; main-app target only.
      - sdk: Translation.framework
      # EmbeddingGemma-300M sentence encoder (CoreML/ANE). Main-app-only —
      # `JotKeyboard` and `JotWatch` never link this. Hides the package API
      # behind `EmbeddingGemmaService` (single import site).
      - package: CoreMLLLM
        product: CoreMLLLM
      - target: JotKeyboard
      # "Send to Jot" Share Extension — embedded into the app's PlugIns/ so it
      # registers in the iOS share sheet for audio. Default embed (app-extension).
      - target: JotShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vineetu.jot.mobile.Jot
        GENERATE_INFOPLIST_FILE: NO
        # iPhone-only (1). iPad (2) was previously paired with the now-deprecated
        # UIRequiresFullScreen=YES to suppress iPad's all-orientations
        # requirement. With UIRequiresFullScreen gone (iOS 26 deprecation),
        # iPad would force us to support landscape, which doesn't fit a
        # one-handed dictation UX. MVP target is iPhone 15 Pro+, so iPhone-only.
        TARGETED_DEVICE_FAMILY: "1"
      # `JOT_APP_HOST` gates main-app-only bodies inside files that live in
      # `Shared/` and are therefore also compiled into the keyboard extension.
      # Used by `RewriteWithPromptIntent` so its `perform()` body can reference
      # main-app-only code (`LLMClientFactory`, `SavedPromptStore`) without
      # breaking extension compilation. The keyboard fires the intent via a
      # `jot://rewrite?session=<uuid>` URL bounce; only the main-app body ever
      # runs.
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG JOT_APP_HOST
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: JOT_APP_HOST

  JotKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Keyboard
      # Keyboard-extension AppIcon catalog. iOS shows this image in
      # Settings → General → Keyboard → Keyboards alongside the
      # extension's CFBundleDisplayName ("Jot Dictation"). Mirrors the
      # main app's modern single-size universal-iOS format — Xcode
      # synthesizes the per-resolution variants from the 1024×1024
      # source at build time. Paired with
      # `ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon` below so the
      # asset compiler picks the right set.
      - path: Keyboard/Assets.xcassets
      - path: Shared
      # Phase 2 of the UX overhaul (mockups 01-03, 06): the keyboard
      # surface uses the Phase-1 design-system tokens — JotDesign,
      # JotType, color extensions on `Color`, GlassCard, SectionLabel,
      # etc. These files have zero main-app dependencies (pure SwiftUI
      # + Color tokens) so compiling them into the appex is free.
      # Files themselves are Phase-1 locked; only the project membership
      # is added here.
      #
      # Phase 2 reviewer FIX 3: explicit per-file inclusion instead of
      # the full `App/Design` directory. DictateFAB and ActionBar are
      # main-app-only — they don't belong in the 60MB extension
      # envelope. The keyboard pulls in only:
      #   - JotDesign.swift (tokens + Color/Font extensions)
      #   - Components/GlassCard.swift, IconBox.swift, SectionLabel.swift
      #   - Components/RowChevron.swift, StatusPill.swift
      #   - Components/TranscribingText.swift (shared live-preview
      #     "still transcribing" ellipsis tail — hero + strip parity)
      - path: App/Design/JotDesign.swift
      - path: App/Design/Components/GlassCard.swift
      - path: App/Design/Components/IconBox.swift
      - path: App/Design/Components/SectionLabel.swift
      - path: App/Design/Components/RowChevron.swift
      - path: App/Design/Components/StatusPill.swift
      - path: App/Design/Components/TranscribingText.swift
      # Common-word guard for the keyboard's "Add to Vocabulary" ("..." popover):
      # the bundled ~24k-word list lets the keyboard tell the user a selection is
      # a common word BEFORE queueing it (same guard the main app applies).
      # CommonWords loads `common-words.txt` from `Bundle.main`, so the asset
      # must ride in the appex bundle too.
      - path: App/Vocabulary/CommonWords.swift
      - path: Resources/common-words.txt
        buildPhase: resources
      - path: Resources/PrivacyInfo.xcprivacy
      # Fraunces must also be inside the keyboard extension bundle so the
      # streaming-strip / just-now-marker text rendered from the appex
      # process resolves the Font.custom(...) PostScript names. Otherwise
      # SwiftUI silently falls back to system serif inside the keyboard.
      - path: Resources/Fonts
        buildPhase: resources
    info:
      path: Resources/Keyboard-Info.plist
      properties:
        CFBundleDisplayName: Jot Dictation
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).JotKeyboardViewController
        # Required for `extensionContext.open(URL("jot://..."))` to actually
        # launch the containing Jot app from the keyboard. iOS 9+ blocks
        # extension URL opens for schemes not declared here.
        LSApplicationQueriesSchemes:
          - jot
        # Phase 1 of the UX overhaul: register Fraunces TTFs inside the
        # keyboard extension bundle too. The keyboard renders the streaming
        # caption + just-now marker with Fraunces; without this UIAppFonts
        # array the appex would silently fall back to system serif.
        #
        # Phase 1 punch-list FIX 1: 9pt-opsz Italic static for 19pt body
        # italic (`editorialItalic`) shipped to the appex as well.
        UIAppFonts:
          - Fraunces-Regular.ttf
          - Fraunces-Medium.ttf
          - Fraunces-Italic.ttf
          - Fraunces-MediumItalic.ttf
          - Fraunces9pt-Italic.ttf
    entitlements:
      path: Resources/Keyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.vineetu.jot.mobile.shared
    # No `dependencies:` block. The keyboard no longer runs Apple
    # Intelligence rewrite in-process — keyboard rewrite URL-bounces
    # into the main app, where Qwen 3.5 on MLX handles the call. The
    # keyboard target therefore needs zero framework or package
    # dependencies beyond what UIKit / SwiftUI / AppIntents pull in
    # transitively for the `Shared/` sources, and those are linked
    # automatically by xcodebuild without an explicit entry. The MLX
    # stack is NOT linked into the keyboard — it lives in the main-app
    # target only (the keyboard's 60 MB ceiling can't host the ~2.5 GB
    # LLM weights anyway). Apple FM remains linked into the main-app
    # target only (for `CleanupService`).
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vineetu.jot.mobile.Jot.Keyboard
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        # Resolves the AppIcon set inside Keyboard/Assets.xcassets so
        # Settings → General → Keyboard → Keyboards shows the lavender
        # paper-crane icon next to "Jot Dictation".
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  # "Send to Jot" Share Extension. Appears in the iOS share sheet for AUDIO
  # only (the activation-rule predicate below). Stages shared audio into the
  # App Group's PendingShares/ queue and shows "Saved to Jot ✓" — it never
  # opens the app (Model B). The main app's PendingShareDrainer transcribes
  # the queue on its next foreground. Pulls in Shared/ for AppGroup; no heavy
  # deps (a share extension can't run Parakeet — see the design doc).
  JotShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Shared
    info:
      path: Resources/ShareExtension-Info.plist
      properties:
        CFBundleDisplayName: Jot
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            # Jot only appears in the share sheet when EVERY shared item is
            # audio (m4a/mp3/wav/caf/aiff all conform to public.audio).
            NSExtensionActivationRule: |
              SUBQUERY (
                  extensionItems,
                  $extensionItem,
                  SUBQUERY (
                      $extensionItem.attachments,
                      $attachment,
                      ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.audio"
                  ).@count == $extensionItem.attachments.@count
              ).@count == $extensionItems.@count
    entitlements:
      path: Resources/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.vineetu.jot.mobile.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vineetu.jot.mobile.Jot.ShareExtension
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  JotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Jot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vineetu.jot.mobile.Jot.Tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: ""

  # Standalone Apple Watch app (watchOS 26+). Records dictation directly
  # on the watch, queues audio locally as AAC 16kHz mono, syncs to the
  # paired iPhone via WatchConnectivity when reachable. Read-only viewer
  # of the most recent 10 transcripts (push-synced back from the phone).
  # Design spec: docs/plans/watch-dictation-design.md
  # Architecture spec: docs/plans/watch-dictation.md
  JotWatch:
    type: application
    platform: watchOS
    # Embed the widget extension inside the watch app bundle. WatchKit
    # apps host their widgets as nested app extensions, same shape as
    # iOS apps + iOS widgets.
    dependencies:
      - target: JotWatchWidgets
        embed: true
    sources:
      # Watch-app SwiftUI views + recorder + sync client.
      - path: Watch
      # Platform-agnostic schema (Transcript V5) + watch-safe design
      # tokens. EXPLICITLY enumerated rather than globbing Shared/
      # because most files in Shared/ import UIKit and won't compile
      # for watchOS. Only these files are watch-safe.
      - path: Shared/Schema/JotSchemaV1.swift
      - path: Shared/Schema/JotSchemaV2.swift
      - path: Shared/Schema/JotSchemaV3.swift
      - path: Shared/Schema/JotSchemaV4.swift
      - path: Shared/Schema/JotSchemaV5.swift
      - path: Shared/Schema/JotSchemaV6.swift
      - path: Shared/Schema/JotSchemaV7.swift
      - path: Shared/Schema/JotSchemaV8.swift
      - path: Shared/Schema/JotMigrationPlan.swift
      - path: Shared/Transcript.swift
      - path: Shared/JotDesignWatchSafe.swift
      # Watch AppIcon — single 1024x1024 universal (modern watchOS 10+
      # asset catalog format). Xcode renders the per-size watch faces
      # at build time. Required for App Store / TestFlight upload —
      # without it, the App Store Connect API rejects with iris 90391
      # ("Missing Icons. No icons found for watch application"). Reuses
      # the iOS app's 1024x1024 master (alpha-free, watchOS-compliant).
      - path: Watch/Assets.xcassets
    info:
      path: Resources/Watch-Info.plist
      properties:
        CFBundleDisplayName: Jot
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        WKApplication: true
        WKWatchOnly: false  # Companion-mode (paired with iOS app)
        WKRunsIndependentlyOfCompanionApp: true  # Recording works without iPhone
        # Links this watch app to its iOS companion. Xcode auto-adds this
        # when you set up a watch app via the "Watch App" target template,
        # but xcodegen does not — has to be declared explicitly. Without
        # it, iOS may not recognize the embedded bundle as a paired app
        # and the install-on-paired-watch flow silently fails.
        WKCompanionAppBundleIdentifier: com.vineetu.jot.mobile.Jot
        NSMicrophoneUsageDescription: "Jot records your voice on the watch so you can dictate text. Audio syncs to your iPhone for transcription. Nothing leaves your devices."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Background audio: needed for WKExtendedRuntimeSession to keep
        # AVAudioRecorder running while the wrist is lowered during a
        # 15-min recording session. Note: watchOS uses UIBackgroundModes
        # for audio (same key as iOS) — WKBackgroundModes is restricted
        # to "workout-processing" only and App Store Connect rejects
        # uploads with WKBackgroundModes = audio (iris-90362).
        UIBackgroundModes:
          - audio
        # Deep-link from widget / complication into the recording view.
        CFBundleURLTypes:
          - CFBundleURLName: com.vineetu.jot.mobile.watch
            CFBundleURLSchemes:
              - jot-watch
    # No entitlements file — the watch app doesn't share state with the
    # iPhone app via App Groups. All cross-device data flows through
    # WatchConnectivity (WCSession.transferFile / transferUserInfo).
    # Watch-side persistence (top-10 cache, pending queue) lives in the
    # watch app's own UserDefaults.standard.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vineetu.jot.mobile.Jot.watch
        TARGETED_DEVICE_FAMILY: "4"  # Apple Watch
        SUPPORTS_MACCATALYST: NO
        SDKROOT: watchos
        WATCHOS_DEPLOYMENT_TARGET: "26.0"
        # SKIP_INSTALL must be YES so the watch app's product does NOT
        # get copied to Products/Applications/ as a top-level standalone.
        # Without this the .xcarchive contains TWO copies of JotWatch.app
        # (one nested correctly inside Jot.app/Watch/, one alongside
        # Jot.app at the top), which makes xcodebuild reject every
        # distribution method during export ("Available distribution
        # methods: { SaveBuiltProducts, ExportArchive }" only) because
        # it can't identify a single primary app. The watch app still
        # builds and the postBuildScript still finds it at
        # BUILD_DIR/Release-watchos/JotWatch.app — SKIP_INSTALL only
        # affects InstallationBuildProductsLocation copy, not BUILD_DIR.
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # WidgetKit extension for the watch app. Provides:
  # - Corner / circular / inline complications for watch faces
  # - Smart Stack tile (relevance 0.5 always-on for v1; history-based
  #   escalation deferred to v1.1)
  # Both deep-link via `jot-watch://record` to launch the watch app
  # directly into the recording sheet (one-tap capture).
  JotWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: WatchWidgets
      - path: Shared/JotDesignWatchSafe.swift
    info:
      path: Resources/WatchWidgets-Info.plist
      properties:
        CFBundleDisplayName: Jot Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    # No entitlements file — widgets read no shared state. Their tap
    # action just deep-links to the watch app via URL.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vineetu.jot.mobile.Jot.watch.widgets
        TARGETED_DEVICE_FAMILY: "4"  # Apple Watch
        SUPPORTS_MACCATALYST: NO
        SDKROOT: watchos
        WATCHOS_DEPLOYMENT_TARGET: "26.0"
        SKIP_INSTALL: YES

schemes:
  Jot:
    build:
      targets:
        Jot: all
        # Force the watch target to build during the iOS archive action.
        # Without this, xcodebuild archive doesn't compile JotWatch
        # and the iOS IPA ships without the paired watch app.
        JotWatch: all
        JotWatchWidgets: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - JotTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  JotKeyboard:
    build:
      targets:
        JotKeyboard: all
    run:
      config: Debug
    archive:
      config: Release
  JotWatch:
    build:
      targets:
        JotWatch: all
        JotWatchWidgets: all
    run:
      config: Debug
    archive:
      config: Release
