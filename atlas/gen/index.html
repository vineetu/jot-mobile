<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Jot Mockup</title>
<link rel="stylesheet" href="jot.css">
<style>
  html,body{height:100%}
  body{margin:0;background:#1f1f24;display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
  .vtop{display:flex;align-items:center;gap:10px;padding:0 12px;height:52px;flex:none;
        background:#26262c;border-bottom:1px solid #34343c;color:#eee;padding-top:env(safe-area-inset-top)}
  .vtop .ham{background:#33333a;color:#eee;border:1px solid #44444c;border-radius:8px;width:38px;height:34px;
        font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
  .vtop .brand{font-weight:700;white-space:nowrap}.vtop .brand span{color:var(--jot-accent)}
  .vtop .spacer{flex:1}
  .seg{display:inline-flex;border:1px solid #44444c;border-radius:8px;overflow:hidden;flex:none}
  .seg button{background:#33333a;color:#ddd;border:0;padding:6px 11px;font:inherit;cursor:pointer}
  .seg button.on{background:var(--jot-accent);color:#fff}
  select{background:#33333a;color:#eee;border:1px solid #44444c;border-radius:8px;padding:6px 8px;font:inherit;max-width:46vw}
  .dim,.stat{color:#8a8a92;font-size:12px;white-space:nowrap}

  .body{flex:1;display:flex;min-height:0;position:relative}
  .vside{width:260px;flex:none;background:#26262c;border-right:1px solid #34343c;overflow:auto;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
  .vside .sh{color:#9a9aa2;font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;padding:10px 14px 4px}
  .vside a{display:flex;gap:8px;align-items:center;padding:9px 14px 9px 20px;color:#c9c9d0;text-decoration:none;font-size:13px;cursor:pointer}
  .vside a:active,.vside a:hover{background:#2e2e35}.vside a.on{background:rgba(26,140,255,.18);color:#fff}
  .vside a .nd{width:7px;height:7px;border-radius:50%;flex:none;border:1.5px solid #6a6a72}
  .vside a .nd.gen{background:var(--jot-success);border-color:var(--jot-success)}
  .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40}

  .stage{flex:1;min-width:0;overflow:auto;display:flex;align-items:center;justify-content:center;padding:16px;position:relative}
  .issuenote{position:absolute;top:0;left:0;right:0;z-index:30;display:none;background:#FBBF24;color:#3a2c00;box-shadow:0 2px 10px rgba(0,0,0,.25)}
  .issuenote.show{display:block}
  .issuenote.target{background:#2E9BFF;color:#fff}
  .issuenote .notinner{font-size:12.5px;line-height:1.4;font-weight:600;padding:10px 42px 12px 14px;max-height:38vh;overflow-y:auto}
  .issuenote .notx{position:absolute;top:7px;right:8px;width:24px;height:24px;border-radius:50%;border:0;background:rgba(0,0,0,.22);color:inherit;font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
  .issuenote b{font-weight:800}
  .vside a .warn{margin-left:auto;color:#f5a623;font-size:13px}
  .vside a .tgt{margin-left:auto;color:#5bb4ff;font-size:13px}
  .fit{position:relative;flex:none}
  .fit .device{transform-origin:top left}
  .missing{display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;height:100%;color:var(--jot-ink-cap);text-align:center;padding:30px}

  /* collapsed sidebar on desktop */
  body.nav-hidden .vside{display:none}

  /* ---- phone ---- */
  @media (max-width:760px){
    .vtop{gap:8px;padding-left:8px;padding-right:8px}
    .vtop .brand,.stat{display:none}
    .vside{position:absolute;top:0;bottom:0;left:0;z-index:50;transform:translateX(-100%);transition:transform .22s ease;
           box-shadow:6px 0 24px rgba(0,0,0,.4)}
    body:not(.nav-hidden) .vside{transform:translateX(0)}
    body:not(.nav-hidden) .backdrop{opacity:1;pointer-events:auto}
  }
</style>
</head><body class="nav-hidden">
  <div class="vtop">
    <button class="ham" id="ham" aria-label="Menu">☰</button>
    <div class="brand">Jot <span>Mockup</span></div>
    <span class="seg" id="themeSeg"><button data-t="light" class="on">Light</button><button data-t="dark">Dark</button></span>
    <select id="dev"></select>
    <span class="dim" id="dim"></span>
    <span class="spacer"></span>
    <span class="stat" id="stat"></span>
  </div>
  <div class="body">
    <div class="vside" id="side"></div>
    <div class="backdrop" id="backdrop"></div>
    <div class="stage" id="stage">
      <div class="issuenote" id="issueNote"></div>
      <div class="fit" id="fit">
        <div class="device" id="device">
          <div class="statusbar"><span class="t">9:41</span><span class="island"></span><span class="r">●●●| ✦ 100</span></div>
          <div class="screen-scroll" id="scroll"><div class="missing">Select a screen.</div></div>
        </div>
      </div>
    </div>
  </div>
<script>
let ATLAS=null, DEVS=[], current=null; const SCREENS={};
const isPhone=()=>matchMedia('(max-width:760px)').matches;
async function fragExists(id){ try{const r=await fetch('frag/'+id+'.html',{method:'HEAD'});return r.ok;}catch{return false;} }
async function boot(){
  ATLAS=await (await fetch('atlas.json')).json();
  DEVS=ATLAS.devices||[{id:'16pro',name:'iPhone 16/17 Pro',ptW:402,ptH:874,scale:3,default:true}];
  document.getElementById('dev').innerHTML=DEVS.map(d=>`<option value="${d.id}" ${d.default?'selected':''}>${d.name} · ${d.ptW}×${d.ptH}</option>`).join('');
  const side=document.getElementById('side'); side.innerHTML='';
  let genCount=0, total=0;
  for(const s of ATLAS.surfaces){
    const h=document.createElement('div');h.className='sh';h.textContent=`${s.num}. ${s.title}`;side.appendChild(h);
    for(const sc of s.screens){
      total++;
      SCREENS[sc.id]=sc;
      const a=document.createElement('a');a.dataset.id=sc.id;
      const has=await fragExists(sc.id); if(has)genCount++;
      a.innerHTML=`<span class="nd ${has?'gen':''}"></span><span>${sc.title}</span>${sc.issue?'<span class="warn" title="Known issue">⚠</span>':sc.target?'<span class="tgt" title="Design target">✦</span>':''}`;
      a.onclick=()=>{ load(sc.id); if(isPhone()) setNav(false); };
      if(!has)a.style.opacity=.5;
      side.appendChild(a);
      if(has && !current) current=sc.id;
    }
  }
  document.getElementById('stat').textContent=`${genCount}/${total} generated`;
  setDevice(document.getElementById('dev').value); setTheme('light');
  document.body.classList.toggle('nav-hidden', isPhone());  // phone: closed; desktop: open
  if(current) load(current);
}
async function load(id){
  current=id;
  document.querySelectorAll('.vside a').forEach(a=>a.classList.toggle('on',a.dataset.id===id));
  const scroll=document.getElementById('scroll');
  try{ const r=await fetch('frag/'+id+'.html'); if(!r.ok)throw 0; scroll.innerHTML=await r.text(); }
  catch{ scroll.innerHTML='<div class="missing"><b>Not generated yet</b><div>'+id+'</div></div>'; }
  scroll.scrollTop=0;
  const note=document.getElementById('issueNote'), sc=SCREENS[id];
  note.classList.remove('target');
  function showNote(label, body, isTarget){
    note.innerHTML='<button class="notx" title="Dismiss">✕</button><div class="notinner"><b>'+label+'</b> '+body+'</div>';
    note.classList.add('show'); if(isTarget) note.classList.add('target');
    note.querySelector('.notx').onclick=()=>note.classList.remove('show');
  }
  if(sc&&sc.issue) showNote('⚠ Known issue:', sc.issue, false);
  else if(sc&&sc.target) showNote('✦ Design target:', sc.target, true);
  else note.classList.remove('show');
}
function setTheme(t){document.documentElement.dataset.theme=t;
  document.querySelectorAll('#themeSeg button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));}
function setDevice(id){const d=DEVS.find(x=>x.id===id)||DEVS[0];const dev=document.getElementById('device');
  dev.style.width=d.ptW+'px';dev.style.height=d.ptH+'px';
  document.getElementById('dim').textContent=`${d.ptW}×${d.ptH}`;
  fitDevice(d);}
function fitDevice(d){
  d=d||DEVS.find(x=>x.id===document.getElementById('dev').value)||DEVS[0];
  const dev=document.getElementById('device'), fit=document.getElementById('fit'), stage=document.getElementById('stage');
  const availW=stage.clientWidth-24, availH=stage.clientHeight-24;
  const s=Math.min(1, availW/d.ptW, availH/d.ptH);
  dev.style.transform=`scale(${s})`;
  fit.style.width=(d.ptW*s)+'px'; fit.style.height=(d.ptH*s)+'px';
}
function setNav(open){ document.body.classList.toggle('nav-hidden', !open); }
document.getElementById('ham').onclick=()=>document.body.classList.toggle('nav-hidden');
document.getElementById('backdrop').onclick=()=>setNav(false);
document.querySelectorAll('#themeSeg button').forEach(b=>b.onclick=()=>setTheme(b.dataset.t));
document.getElementById('dev').onchange=e=>setDevice(e.target.value);
addEventListener('resize',()=>fitDevice());
addEventListener('orientationchange',()=>setTimeout(()=>fitDevice(),200));
boot();
</script>
</body></html>
