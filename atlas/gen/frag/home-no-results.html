<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">

    <svg viewBox="0 0 24 24"><path d="M13 3c-3 0-5 2-5 6v6c0 2-1 3-2 3v2c4 0 6-2 6-6V8c0-2 1-3 2-3z"/></svg>
  </span>
  <div style="display:flex;gap:10px">
    <span class="jot-donebtn" style="width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%">?</span>
    <span class="jot-donebtn" style="width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%">

    </span>
  </div>
</div>

<div class="jot-display" style="font-size:34px;line-height:1.15;margin-bottom:18px">What do you want to dictate today?</div>

<div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
  <div class="jot-card" style="flex:1;display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:14px;border:1px solid var(--jot-accent)">
    <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:var(--jot-accent)"><path d="M10 2a8 8 0 105 14.3l5 5 1.4-1.4-5-5A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
    <span class="jot-row-title">quarterly budget xyz<span style="display:inline-block;width:2px;height:16px;background:var(--jot-accent);vertical-align:middle;margin-left:2px"></span></span>
    <span style="margin-left:auto;width:18px;height:18px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.4;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;flex:none">✕</span>
  </div>
</div>

<div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:80px 24px 0">
  <span class="jot-tile hero" style="--c1:#8B8E96;--c2:#72747B;margin-bottom:22px">
    <svg viewBox="0 0 24 24"><path d="M10 2a8 8 0 105 14.3l5 5 1.4-1.4-5-5A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
  </span>
  <div class="jot-title" style="font-size:24px;margin-bottom:10px">No matches</div>
  <div class="jot-row-sub" style="max-width:250px;line-height:1.45">Nothing matched “quarterly budget xyz.” Try a different search term.</div>
</div>
