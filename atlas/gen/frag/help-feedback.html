<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
  <span class="jot-donebtn" style="padding:7px 12px">‹</span>
  <span style="font-weight:600;font-size:17px;color:var(--jot-ink)">Send feedback</span>
  <span style="width:34px"></span>
</div>

<div class="jot-display" style="margin:10px 0 10px">Tell us anything.</div>
<div class="jot-row-sub" style="font-size:14px;margin:0 2px 18px">Attach screenshots if you're reporting a bug — they help us see what went wrong.</div>

<div class="jot-card" style="height:300px;padding:16px">
  <div class="jot-row-sub" style="font-size:16px;color:var(--jot-ink-cap)">Bugs, ideas, or anything else…</div>
</div>

<div style="display:flex;align-items:center;gap:8px;margin:16px 2px 0;color:var(--jot-accent);font-size:16px;font-weight:600">
  <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:var(--jot-accent);stroke-width:2"><path d="M21 11l-9 9a5 5 0 01-7-7l9-9a3 3 0 014 4l-9 9a1 1 0 01-2-2l8-8"/></svg>
  Add screenshots
</div>

<div class="jot-card" style="margin-top:18px">
  <div class="jot-row">
    <div class="grow jot-row-title" style="font-size:16px">Include diagnostic logs</div>
    <span class="jot-toggle off"></span>
  </div>
</div>
<div class="jot-caption">No personal info or transcripts — just anonymous app events</div>
