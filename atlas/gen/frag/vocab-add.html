<!-- dimmed list peeking behind a half-height "New term" sheet -->
<div style="opacity:0.4;pointer-events:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <span class="jot-donebtn" style="padding:7px 12px">‹</span>
    <span style="font-weight:700;font-size:17px;color:var(--jot-ink)">Vocabulary</span>
    <span class="jot-donebtn">Edit</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin:4px 2px 16px">
    <span style="display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:0.8px;color:var(--jot-ink-cap);background:rgba(120,120,128,0.20)">EXPERIMENTAL</span>
    <span style="font-size:14px;color:var(--jot-ink-2)">Vocabulary biasing</span>
  </div>
  <div class="jot-card">
    <div class="jot-row"><div class="grow jot-row-title" style="font-size:16px">Enable vocabulary boosting</div><span class="jot-toggle"></span></div>
  </div>
  <div style="display:flex;align-items:baseline;justify-content:space-between;margin:22px 2px 8px">
    <div class="jot-section" style="margin:0">Terms · 16</div>
    <span style="font-size:13px;color:var(--jot-ink-cap)">A to Z</span>
  </div>
  <div class="jot-card">
    <div class="jot-row"><div class="grow jot-row-title" style="font-size:16px">Jamy</div></div>
    <div class="jot-row"><div class="grow jot-row-title" style="font-size:16px">Vineet</div></div>
    <div class="jot-row"><div class="grow jot-row-title" style="font-size:16px">Zhuang</div></div>
  </div>
</div>

<!-- half-height modal sheet -->
<div style="position:absolute;left:0;right:0;bottom:0;height:420px;background:linear-gradient(var(--jot-card-top),var(--jot-card-bot));-webkit-backdrop-filter:blur(30px);backdrop-filter:blur(30px);border-top:0.5px solid var(--jot-card-border);border-radius:24px 24px 0 0;padding:14px 20px 0;box-shadow:0 -8px 40px rgba(0,0,0,0.18)">
  <div style="width:38px;height:5px;border-radius:3px;background:var(--jot-sep);margin:0 auto 18px"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px">
    <span style="font-size:16px;color:var(--jot-ink-2)">Cancel</span>
    <span style="font-weight:700;font-size:17px;color:var(--jot-ink)">New term</span>
    <span style="font-size:16px;font-weight:600;color:var(--jot-accent)">Add</span>
  </div>

  <div class="jot-section" style="margin:0 2px 8px">Term</div>
  <div class="jot-card">
    <div class="jot-row" style="padding:16px">
      <div class="grow" style="font-size:17px;color:var(--jot-ink)">Gautam Maran<span style="display:inline-block;width:2px;height:20px;background:var(--jot-accent);vertical-align:middle;margin-left:1px"></span></div>
    </div>
  </div>
  <div class="jot-caption">Type a name, product, or technical word exactly the way you want Jot to spell it.</div>
</div>
