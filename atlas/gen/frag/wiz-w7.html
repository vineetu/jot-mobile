<div style="position:absolute;inset:0;display:flex;flex-direction:column">
<!-- top chrome: back chevron + page dots (W7 active) + close -->
<div style="display:flex;align-items:center;justify-content:center;position:relative;margin:8px 0 6px;min-height:36px">
  <div class="jot-donebtn" style="position:absolute;left:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0;font-size:18px;font-weight:700">‹</div>
  <div style="display:flex;align-items:center;gap:7px">
    <span style="width:7px;height:7px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.55"></span>
    <span style="width:7px;height:7px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.55"></span>
    <span style="width:7px;height:7px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.55"></span>
    <span style="width:7px;height:7px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.55"></span>
    <span style="width:7px;height:7px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.55"></span>
    <span style="width:7px;height:7px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.55"></span>
    <span style="width:9px;height:9px;border-radius:50%;background:var(--jot-accent)"></span>
  </div>
  <div class="jot-donebtn" style="position:absolute;right:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0;font-size:16px;font-weight:600">✕</div>
</div>

<div style="flex:1"></div>

<div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 8px">
  <span class="jot-tile hero" style="--c1:#34C759;--c2:#2BA349">
    <svg viewBox="0 0 24 24" style="fill:none;stroke:#fff;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round"><path d="M5 13l4.5 4.5L19 7"/></svg>
  </span>
  <div class="jot-display" style="font-size:42px;margin-top:26px">You're ready.</div>
  <div style="font-size:17px;color:var(--jot-ink-2);margin-top:18px;line-height:1.4;max-width:320px">Jot works now — start dictating in any app, any time.</div>
</div>

<!-- Apple Watch "one more thing" card -->
<div class="jot-card" style="margin-top:26px;background:linear-gradient(rgba(26,140,255,0.10),rgba(26,140,255,0.05))">
  <div class="jot-row" style="align-items:flex-start;gap:14px">
    <span class="jot-tile" style="--c1:#5AA7FF;--c2:#3E8BE8;width:40px;height:40px;border-radius:11px">
      <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.8"><rect x="6" y="7" width="12" height="10" rx="3"/><path d="M8.5 7l.6-2.4a1.5 1.5 0 011.45-1.1h2.9a1.5 1.5 0 011.45 1.1L15.5 7M8.5 17l.6 2.4a1.5 1.5 0 001.45 1.1h2.9a1.5 1.5 0 001.45-1.1L15.5 17" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <div class="grow">
      <div class="jot-row-title" style="font-weight:700;font-size:16px">It's on your wrist, too</div>
      <div class="jot-row-sub" style="margin-top:3px">Caught an idea without your phone? Tap the Jot complication and speak — it syncs back automatically.</div>
    </div>
  </div>
</div>

<div style="flex:2"></div>

<div class="jot-cta">Start jotting.</div>
</div>
