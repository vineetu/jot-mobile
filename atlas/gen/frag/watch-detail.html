<!-- Apple Watch — single transcript detail (TranscriptDetailView.swift). Title "Transcript", read-only. -->
<div style="max-width:200px;margin:40px auto;background:#000;border-radius:36px;padding:14px 12px 16px;color:#fff;font-family:-apple-system,system-ui,sans-serif">

  <!-- Inline nav title -->
  <div style="text-align:center;font-size:15px;font-weight:600;color:#fff;margin-bottom:10px">Transcript</div>

  <!-- Date · time header -->
  <div style="font-size:13px;color:rgba(255,255,255,0.42);padding:0 2px;margin-bottom:8px">Jun 21, 2026 · 9:14 AM</div>

  <!-- Recorded on watch badge -->
  <div style="display:flex;align-items:center;gap:4px;color:rgba(255,255,255,0.62);margin-bottom:10px">
    <svg viewBox="0 0 24 24" style="width:13px;height:13px"><rect x="7" y="2" width="10" height="20" rx="3" fill="none" stroke="rgba(255,255,255,0.62)" stroke-width="2"/></svg>
    <span style="font-size:13px">Recorded on watch</span>
  </div>

  <!-- Full text card -->
  <div style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.10);border-radius:12px;padding:8px 10px;margin-bottom:10px">
    <div style="font-size:15px;line-height:1.45;color:#fff">Pick up almond milk and eggs on the way home. Also grab coffee filters if they have the unbleached ones, and check whether the dry cleaning is ready for pickup.</div>
  </div>

  <!-- Synced status row -->
  <div style="display:flex;align-items:center;gap:8px;padding:0 2px">
    <span style="width:17px;height:17px;border-radius:50%;background:#34C759;display:flex;align-items:center;justify-content:center;flex:none">
      <svg viewBox="0 0 24 24" style="width:10px;height:10px;fill:#000"><path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.5-1.5z"/></svg>
    </span>
    <span style="font-size:14px;font-weight:500;color:rgba(255,255,255,0.62)">Synced to iPhone</span>
  </div>

</div>
