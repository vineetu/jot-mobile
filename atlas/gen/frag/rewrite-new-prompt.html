<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
  <span style="color:var(--jot-accent);font-size:15px">Cancel</span>
  <div style="font-weight:600;font-size:17px;color:var(--jot-ink)">New prompt</div>
  <span style="font-size:15px;font-weight:600;color:var(--jot-ink-cap)">Save</span>
</div>

<div class="jot-section">Name</div>
<div class="jot-card">
  <div class="jot-row">
    <span class="jot-row-title" style="color:var(--jot-ink-cap)">Prompt name</span>
  </div>
</div>

<div class="jot-section">Icon</div>
<div class="jot-card">
  <div class="jot-row" style="justify-content:space-between;gap:6px;flex-wrap:wrap">
    <span class="jot-tile" style="--c1:#FF6B57;--c2:#D15847;width:38px;height:38px;border-radius:11px;box-shadow:0 0 0 2px var(--jot-card-top),0 0 0 4px #FF6B57"></span>
    <span class="jot-tile" style="--c1:#FF9A33;--c2:#D17E2A"></span>
    <span class="jot-tile" style="--c1:#34C759;--c2:#2BA349"></span>
    <span class="jot-tile" style="--c1:#1FCED1;--c2:#19A9AB"></span>
    <span class="jot-tile" style="--c1:#1A8CFF;--c2:#1573D1"></span>
    <span class="jot-tile" style="--c1:#7C5CFF;--c2:#664BD1"></span>
    <span class="jot-tile" style="--c1:#FF4F6B;--c2:#D14158"></span>
    <span class="jot-tile" style="--c1:#8B8E96;--c2:#72747B"></span>
  </div>
</div>

<div class="jot-section">System prompt</div>
<div class="jot-card">
  <div style="padding:16px;min-height:140px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;line-height:1.5;color:var(--jot-ink-cap)">
    Describe how Jot should transform the selected text. Tip: be specific about voice, length, and what to preserve. Test on a recording before saving.
  </div>
</div>

<div class="jot-section">Start from a template</div>
<div style="display:flex;flex-wrap:wrap;gap:8px;margin:2px 2px 0">
  <span style="padding:8px 14px;border-radius:999px;background:var(--jot-card-top);border:0.5px solid var(--jot-card-border);font-size:14px;color:var(--jot-ink)">Translate to…</span>
  <span style="padding:8px 14px;border-radius:999px;background:var(--jot-card-top);border:0.5px solid var(--jot-card-border);font-size:14px;color:var(--jot-ink)">Make it shorter</span>
  <span style="padding:8px 14px;border-radius:999px;background:var(--jot-card-top);border:0.5px solid var(--jot-card-border);font-size:14px;color:var(--jot-ink)">More formal</span>
  <span style="padding:8px 14px;border-radius:999px;background:var(--jot-card-top);border:0.5px solid var(--jot-card-border);font-size:14px;color:var(--jot-ink)">Action items</span>
</div>
