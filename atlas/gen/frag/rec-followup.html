<div style="display:flex;flex-direction:column;height:100%">
  <span class="jot-donebtn" style="width:40px;height:40px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:20px;font-weight:500;align-self:flex-start">‹</span>

  <div class="jot-title" style="font-size:27px;line-height:1.22;margin-top:28px">Say a change — “make it shorter,” “translate that.”</div>

  <!-- the just-dictated text the command will act on -->
  <div class="jot-card" style="margin-top:20px;padding:14px 16px;border-radius:16px">
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:#FF6B57"><path d="M12 2l1.8 5.2L19 9l-5.2 1.8L12 16l-1.8-5.2L5 9l5.2-1.8z"/></svg>
      <span style="font-size:11px;font-weight:700;letter-spacing:1.2px;color:var(--jot-ink-cap)">JUST DICTATED · ACTING ON THIS</span>
    </div>
    <div class="jot-row-title" style="line-height:1.4;font-weight:400">Hey, can we move the design review to Thursday afternoon and loop in the whole team so everyone's aligned before we ship?</div>
  </div>

  <div style="flex:1"></div>

  <!-- follow-up listening prompt -->
  <div style="display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:24px">
    <div class="jot-title" style="font-size:20px;font-style:italic">Listening for your command<span style="color:var(--jot-accent);font-weight:600;letter-spacing:2px"> ···</span></div>
    <div class="jot-row-sub" style="margin-top:8px">Follow-up window — 22s left</div>
  </div>

  <!-- control cluster -->
  <div style="display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:8px">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--jot-card-top);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border:0.5px solid var(--jot-card-border);box-shadow:0 4px 14px rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center">
      <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:var(--jot-ink)"><path d="M8 5h3v14H8zm5 0h3v14h-3z"/></svg>
    </div>
    <div style="display:flex;align-items:center;gap:12px;height:64px;padding:0 26px 0 18px;border-radius:999px;background:linear-gradient(var(--jot-accent),var(--jot-accent-deep));box-shadow:0 0 28px rgba(26,140,255,0.55)">
      <span style="width:24px;height:24px;border-radius:7px;background:#fff;flex:none"></span>
      <span style="font-family:ui-monospace,'SF Mono',monospace;font-size:22px;font-weight:600;color:#fff">0:02</span>
    </div>
    <div style="width:64px;height:64px;border-radius:50%;background:var(--jot-card-top);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border:0.5px solid var(--jot-card-border);box-shadow:0 4px 14px rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center">
      <svg viewBox="0 0 24 24" style="width:21px;height:21px;fill:var(--jot-record)"><path d="M9 3h6l1 2h4v2H4V5h4zm-3 4h12l-1 13a2 2 0 01-2 2H9a2 2 0 01-2-2z"/></svg>
    </div>
  </div>

  <div style="flex:0.3"></div>
</div>
