<!-- Apple Watch — sync diagnostics (DiagnosticsView.swift). Title "Diagnostics". -->
<div style="max-width:200px;margin:40px auto;background:#000;border-radius:36px;padding:14px 12px 16px;color:#fff;font-family:-apple-system,system-ui,sans-serif">

  <!-- Inline nav title -->
  <div style="text-align:center;font-size:15px;font-weight:600;color:#fff;margin-bottom:10px">Diagnostics</div>

  <!-- Status card: connection + pending count -->
  <div style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.10);border-radius:12px;padding:8px 10px;margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:6px">
      <svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:#34C759"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm-1 14l-4-4 1.4-1.4L11 13.2l5.6-5.6L18 9z"/></svg>
      <span style="font-size:13px;font-weight:600;color:#fff">Connected</span>
    </div>
    <div style="font-size:13px;color:#FF9F30;margin-top:6px">2 waiting to sync</div>
  </div>

  <!-- Reset sync pill (full-width blue gradient) -->
  <div style="height:50px;border-radius:25px;background:linear-gradient(#3AA0FF,#1483F2,#0064CC);border:0.5px solid rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:#fff;margin-bottom:8px">Reset sync</div>

  <!-- Helper caption -->
  <div style="font-size:13px;color:rgba(255,255,255,0.42);text-align:center;padding:0 4px;line-height:1.4">Resets the queue and re-sends pending notes to your iPhone.</div>

</div>
