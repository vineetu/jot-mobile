<!-- Speech model download failure (§12.2) — surfaces on the dictation surface. -->
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
  <span class="jot-tile" style="--c1:#15171C;--c2:#15171C;width:34px;height:34px;border-radius:50%;background:var(--jot-card-top);border:0.5px solid var(--jot-card-border)">
    <svg viewBox="0 0 24 24" style="fill:none;stroke:var(--jot-ink);stroke-width:2.4"><path d="M15 6l-6 6 6 6"/></svg>
  </span>
  <span class="jot-donebtn">Done</span>
</div>

<div class="jot-display" style="margin:6px 0 2px">Jot down.</div>

<div style="display:flex;flex-direction:column;align-items:center;gap:18px;margin-top:60px">
  <span class="jot-tile hero" style="--c1:#FF9F30;--c2:#B87314">
    <svg viewBox="0 0 24 24" style="fill:none;stroke:#fff;stroke-width:2.4;stroke-linecap:round"><path d="M12 8v5"/><circle cx="12" cy="17" r="0.6" fill="#fff" stroke="none"/><path d="M10.3 4.3L3 18a1.8 1.8 0 001.6 2.7h14.8A1.8 1.8 0 0021 18L13.7 4.3a2 2 0 00-3.4 0z"/></svg>
  </span>
  <div class="jot-title" style="font-size:24px;text-align:center">Download didn't finish.</div>
</div>

<div class="jot-card" style="margin-top:22px;padding:16px">
  <div class="jot-row-sub" style="font-size:13.5px;line-height:1.45">The English speech model couldn't download. Check your connection and tap the mic to try the dictation again — Jot will retry the download automatically.</div>
</div>

<div class="jot-cta" style="margin-top:18px">
  <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2"><path d="M21 12a9 9 0 11-3-6.7M21 4v4h-4"/></svg>
  Retry dictation
</div>
<div class="jot-caption" style="text-align:center">About 180 MB · downloads once, then stays on your iPhone.</div>
