<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">

<div class="jot-card" style="display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:14px;margin-bottom:14px">
  <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:var(--jot-ink-cap)"><path d="M10 2a8 8 0 105 14.3l5 5 1.4-1.4-5-5A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>

  <span class="jot-tile hero" style="--c1:#1A8CFF;--c2:#0064CC;margin-bottom:22px">
    <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V6a3 3 0 00-6 0v5a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 006 6.9V21h2v-3.1A7 7 0 0019 11z"/></svg>

  <div class="jot-row-sub" style="max-width:260px;line-height:1.45">Tap <span style="color:var(--jot-accent);font-weight:600">Jot down</span> and just start talking. Everything you capture lands in this library.</div>

<div style="position:absolute;left:0;right:0;bottom:34px;display:flex;justify-content:center">

    Jot down
