<!-- Voice prompt sheet (§7.13). Matched to the real on-device screen: ✕ top-left, centered
     "Voice prompt", "● Listening…" (coral dot), left-aligned dictated instruction, large empty
     space, full-width coral "■ Stop" pill at the bottom. -->
<div style="height:150px"></div>

<div class="jot-card" style="border-radius:24px 24px 0 0;margin:0 -18px -34px;min-height:600px;padding:10px 18px 40px;display:flex;flex-direction:column">
  <div style="width:36px;height:5px;border-radius:3px;background:var(--jot-ink-cap);opacity:.45;margin:0 auto 16px"></div>

  <div style="display:flex;align-items:center;margin-bottom:26px">
    <span style="font-size:24px;color:var(--jot-ink);width:40px;line-height:1">✕</span>
    <div style="flex:1;text-align:center;font-weight:700;font-size:19px;color:var(--jot-ink);margin-left:-40px">Voice prompt</div>
  </div>

  <div style="display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:22px">
    <span style="width:11px;height:11px;border-radius:50%;background:#FF6B57"></span>
    <span style="font-size:20px;font-weight:600;color:var(--jot-ink)">Listening…</span>
  </div>

  <div style="font-size:18px;line-height:1.45;color:var(--jot-ink-2)">I think it's one of the back. Okay, I think I want you to simulate I want two lines.</div>

  <div style="flex:1"></div>

  <div style="height:58px;border-radius:999px;background:linear-gradient(#FF7059,#E85540);display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 0 24px rgba(255,90,73,0.42)">
    <span style="width:18px;height:18px;border-radius:4px;background:#fff"></span>
    <span style="color:#fff;font-size:18px;font-weight:600">Stop</span>
  </div>
</div>
