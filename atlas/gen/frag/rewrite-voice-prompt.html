<div style="height:300px"></div>

<div class="jot-card" style="border-radius:24px 24px 0 0;margin:0 -18px -34px;padding:18px 18px 40px;min-height:360px;display:flex;flex-direction:column">
  <div style="display:flex;align-items:center;margin-bottom:18px">
    <div style="flex:1"></div>
    <div style="font-weight:600;font-size:17px;color:var(--jot-ink)">Voice prompt</div>
    <div style="flex:1;display:flex;justify-content:flex-end">
      <span class="jot-donebtn" style="width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:999px">✕</span>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:20px">
    <span style="width:9px;height:9px;border-radius:50%;background:var(--jot-record)"></span>
    <span style="font-family:ui-serif,'New York',Georgia,serif;font-style:italic;font-size:19px;color:var(--jot-ink)">Listening…</span>
  </div>

  <div style="flex:1;font-size:18px;line-height:1.5;color:var(--jot-ink);text-align:center;padding:0 6px">
    Make this shorter and turn it into an email to Sam<span style="color:var(--jot-ink-cap)"> </span>
  </div>

  <div class="jot-caption" style="text-align:center;margin-bottom:20px">Say what you want changed, then tap Stop.</div>

  <div style="display:flex;justify-content:center">
    <div style="width:72px;height:72px;border-radius:50%;background:var(--jot-record);display:flex;align-items:center;justify-content:center;box-shadow:0 0 28px rgba(224,23,59,0.4)">
      <span style="width:26px;height:26px;border-radius:6px;background:#fff"></span>
    </div>
  </div>
  <div style="text-align:center;margin-top:10px;color:var(--jot-ink-2);font-size:14px">Stop</div>
</div>
