<div style="position:absolute;inset:0;display:flex;flex-direction:column">
<!-- top chrome: back chevron + page dots (W2 active) + close -->
<div style="display:flex;align-items:center;justify-content:center;position:relative;margin:8px 0 6px;min-height:36px">
  <div class="jot-donebtn" style="position:absolute;left:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0;font-size:18px;font-weight:700">‹</div>
  <div style="display:flex;align-items:center;gap:7px">
    <span style="width:7px;height:7px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.55"></span>
    <span style="width:9px;height:9px;border-radius:50%;background:var(--jot-accent)"></span>
    <span style="width:7px;height:7px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.4"></span>
    <span style="width:7px;height:7px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.4"></span>
    <span style="width:7px;height:7px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.4"></span>
    <span style="width:7px;height:7px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.4"></span>
    <span style="width:7px;height:7px;border-radius:50%;background:var(--jot-ink-cap);opacity:0.4"></span>
  </div>
  <div class="jot-donebtn" style="position:absolute;right:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0;font-size:16px;font-weight:600">✕</div>
</div>

<div style="flex:1"></div>

<div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 8px">
  <span class="jot-tile hero" style="--c1:#1A8CFF;--c2:#1573D1">
    <svg viewBox="0 0 24 24"><path d="M12 3a3 3 0 013 3v6a3 3 0 01-6 0V6a3 3 0 013-3zM6 11a6 6 0 0012 0M12 19v3" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </span>
  <div class="jot-display" style="font-size:34px;margin-top:26px">Microphone access</div>
  <div style="font-size:18px;color:var(--jot-ink-2);margin-top:18px;line-height:1.4;max-width:300px">Jot needs the microphone to turn your voice into text. Audio is transcribed on this iPhone and never leaves the device.</div>
</div>

<div style="flex:2"></div>

<div class="jot-cta">Allow microphone</div>
<div class="jot-caption" style="text-align:center;margin-top:14px">Already denied? <span style="color:var(--jot-accent);font-weight:600">Open iPhone Settings</span></div>
</div>
