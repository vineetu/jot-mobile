name: Phi4MiniPrototype
options:
  bundleIdPrefix: com.vineetu.jot.mobile.Jot
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1"
    DEVELOPMENT_TEAM: "8VB2ULDN22"

packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    exactVersion: "3.31.3"
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    minVersion: "0.9.0"
    maxVersion: "1.0.0"
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    minVersion: "1.3.0"
    maxVersion: "2.0.0"
  MLXSwiftStructured:
    path: ../../Vendor/mlx-swift-structured

targets:
  Phi4MiniPrototype:
    type: application
    platform: iOS
    sources:
      - path: Phi4MiniPrototype
    info:
      path: Phi4MiniPrototype/Info.plist
      properties:
        CFBundleDisplayName: Phi4 Mini
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - fetch
          - processing
    dependencies:
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftHuggingFace
        product: HuggingFace
      - package: SwiftTransformers
        product: Tokenizers
      - package: MLXSwiftStructured
        product: MLXStructured
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vineetu.jot.mobile.Jot.Phi4Prototype
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

schemes:
  Phi4MiniPrototype:
    build:
      targets:
        Phi4MiniPrototype: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
