name: DualModelPrototype
options:
  bundleIdPrefix: com.vineetu.jot.mobile
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    DEVELOPMENT_TEAM: "8VB2ULDN22"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: "0.13.6"

targets:
  DualModelPrototype:
    type: application
    platform: iOS
    sources:
      - path: DualModelPrototype
    info:
      path: DualModelPrototype/Info.plist
      properties:
        CFBundleDisplayName: DualModel
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Records your voice to test dual ASR models on-device."
        UIBackgroundModes:
          - audio
    dependencies:
      - package: FluidAudio
        product: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vineetu.jot.mobile.dualmodelprototype
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

schemes:
  DualModelPrototype:
    build:
      targets:
        DualModelPrototype: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
